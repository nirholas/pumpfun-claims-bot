<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PumpKit — Open-Source PumpFun Monitoring Framework for Solana</title>
    <meta name="description" content="PumpKit is an open-source TypeScript framework for real-time PumpFun monitoring on Solana. Track fee claims, whale trades, token launches, graduations — with Telegram alerts and a live dashboard." />
    <meta name="keywords" content="PumpKit, PumpFun, Solana, pump.fun, fee claims, whale trades, token launches, graduations, Telegram bot, crypto monitoring, TypeScript, open source, DeFi, Raydium, bonding curve" />
    <meta name="author" content="nirholas" />
    <link rel="canonical" href="https://pumpkit.dev/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pumpkit.dev/" />
    <meta property="og:title" content="PumpKit — Open-Source PumpFun Monitoring Framework" />
    <meta property="og:description" content="Real-time PumpFun monitoring on Solana: fee claims, whale trades, token launches, graduations. Open-source TypeScript framework with Telegram alerts and live dashboard." />
    <meta property="og:site_name" content="PumpKit" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PumpKit — Open-Source PumpFun Monitoring Framework" />
    <meta name="twitter:description" content="Real-time PumpFun monitoring on Solana: fee claims, whale trades, token launches, graduations. Open-source TypeScript framework." />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PumpKit",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Cross-platform",
      "description": "Open-source TypeScript framework for real-time PumpFun monitoring on Solana. Track fee claims, whale trades, token launches, and graduations with Telegram alerts.",
      "url": "https://pumpkit.dev/",
      "author": {
        "@type": "Person",
        "name": "nirholas",
        "url": "https://github.com/nirholas"
      },
      "license": "https://opensource.org/licenses/MIT",
      "programmingLanguage": "TypeScript",
      "codeRepository": "https://github.com/nirholas/pumpkit",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PumpKit",
      "url": "https://pumpkit.dev/",
      "description": "Open-source PumpFun monitoring framework for Solana",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://pumpkit.dev/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://pumpkit.dev/" },
        { "@type": "ListItem", "position": 2, "name": "Live Dashboard", "item": "https://pumpkit.dev/dashboard" },
        { "@type": "ListItem", "position": 3, "name": "Create Coin", "item": "https://pumpkit.dev/create" },
        { "@type": "ListItem", "position": 4, "name": "Documentation", "item": "https://pumpkit.dev/docs" },
        { "@type": "ListItem", "position": 5, "name": "Packages", "item": "https://pumpkit.dev/packages" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
